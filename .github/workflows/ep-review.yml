name: EP Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - '**/prd.md'
      - '**/design.md'
      - '**/DESIGN.md'
      - '**/Design.md'
      - 'enhancements/**/README.md'

  issue_comment:
    types: [created]

jobs:
  resolve-pr:
    if: >-
      github.event_name == 'pull_request_target'
      || (github.event_name == 'issue_comment'
          && github.event.issue.pull_request
          && contains(github.event.comment.body, '/review-ep')
          && contains(fromJSON('["MEMBER","COLLABORATOR","OWNER"]'),
                      github.event.comment.author_association))
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    outputs:
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      base_ref: ${{ steps.resolve.outputs.base_ref }}
    steps:
      - name: Validate slash command
        if: github.event_name == 'issue_comment'
        id: validate
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          if echo "$COMMENT_BODY" | grep -qP '(?m)^\s*/review-ep'; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Comment contains '/review-ep' but not as a line-starting command"
            exit 1
          fi

      - name: Acknowledge comment
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes --silent

      - name: Resolve PR context
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request_target" ]]; then
            echo "pr_number=$EVENT_PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "head_sha=$EVENT_PR_HEAD_SHA" >> "$GITHUB_OUTPUT"
            echo "base_ref=$EVENT_PR_BASE_REF" >> "$GITHUB_OUTPUT"

          elif [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            PR_JSON=$(gh pr view "$EVENT_ISSUE_NUMBER" --repo "${{ github.repository }}" --json headRefOid,baseRefName)
            echo "pr_number=$EVENT_ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
            echo "head_sha=$(echo "$PR_JSON" | jq -r .headRefOid)" >> "$GITHUB_OUTPUT"
            echo "base_ref=$(echo "$PR_JSON" | jq -r .baseRefName)" >> "$GITHUB_OUTPUT"
          fi

  review:
    needs: resolve-pr
    runs-on: ubuntu-latest
    concurrency:
      group: ep-review-${{ needs.resolve-pr.outputs.pr_number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.resolve-pr.outputs.base_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Clone workspace
        run: git clone --depth 1 https://github.com/osac-project/osac-workspace /opt/skills

      - name: Set up GCP credentials
        run: echo "$GCP_SA_KEY" | base64 -d > /tmp/gcp-sa-key.json
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Run EP review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json
          ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.GCP_PROJECT }}
          CLOUD_ML_REGION: ${{ secrets.GCP_REGION }}
          EP_REVIEW_SHADOW: ${{ vars.EP_REVIEW_SHADOW || 'true' }}
          PR_NUMBER: ${{ needs.resolve-pr.outputs.pr_number }}
          PR_HEAD_SHA: ${{ needs.resolve-pr.outputs.head_sha }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          EVENT_BEFORE_SHA: ${{ github.event.before }}
        run: python .github/scripts/ep_review.py

      - name: Upload OTEL metrics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: ep-review-otel-pr${{ needs.resolve-pr.outputs.pr_number }}-run${{ github.run_id }}
          path: workdir-*/_run/claude-otel.jsonl
          retention-days: 90
          if-no-files-found: ignore
